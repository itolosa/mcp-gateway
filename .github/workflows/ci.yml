name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Test with coverage
        run: cargo llvm-cov --ignore-filename-regex 'main\.rs' --fail-under-lines 100 --fail-under-functions 100

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          LINES=$(cargo llvm-cov report --json --ignore-filename-regex 'main\.rs' | jq '.data[0].totals.lines.percent')
          if awk "BEGIN {exit !($LINES >= 100)}"; then COLOR=brightgreen
          elif awk "BEGIN {exit !($LINES >= 90)}"; then COLOR=green
          elif awk "BEGIN {exit !($LINES >= 80)}"; then COLOR=yellowgreen
          else COLOR=red; fi
          BADGE_DIR=$(mktemp -d)
          git clone --branch badges --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$BADGE_DIR"
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$LINES" "$COLOR" > "$BADGE_DIR/coverage.json"
          cd "$BADGE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git diff --cached --quiet || git commit -m "coverage: ${LINES}%" && git push
