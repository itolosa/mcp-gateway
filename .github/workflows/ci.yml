name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      update_badge:
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Test with coverage
        run: cargo llvm-cov --ignore-filename-regex 'main\.rs' --fail-under-lines 100 --fail-under-functions 100

      - name: Extract coverage percentage
        if: inputs.update_badge
        id: coverage
        run: |
          LINES=$(cargo llvm-cov report --json --ignore-filename-regex 'main\.rs' | jq '.data[0].totals.lines.percent')
          echo "percentage=${LINES}" >> "$GITHUB_OUTPUT"
          if awk "BEGIN {exit !($LINES >= 100)}"; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN {exit !($LINES >= 90)}"; then echo "color=green" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN {exit !($LINES >= 80)}"; then echo "color=yellowgreen" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Update coverage badge
        if: inputs.update_badge
        uses: action-badges/core@0.4.0
        with:
          label: coverage
          message: "${{ steps.coverage.outputs.percentage }}%"
          message-color: "${{ steps.coverage.outputs.color }}"
          file-name: coverage.svg
          badge-branch: badges
          github-token: "${{ secrets.GITHUB_TOKEN }}"
