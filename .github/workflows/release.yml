name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TARGET_DIR: target

jobs:
  tag:
    name: Create CalVer Tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.calver.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: calver
        run: |
          BASE=$(date -u +%Y.%m.%d)
          TAG="$BASE"
          SUFFIX=0
          while git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="${BASE}.${SUFFIX}"
          done
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.calver.outputs.tag_name }}"
          git push origin "${{ steps.calver.outputs.tag_name }}"

  build:
    name: Build ${{ matrix.target }}
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        shell: bash
        run: |
          BIN=mcp-gateway
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN="${BIN}.exe"
          fi
          ARCHIVE="${BIN}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" "${BIN}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
