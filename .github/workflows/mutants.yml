name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/mutants.toml"
      - "tests/**"

permissions:
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target
  COVERAGE_JOBS: 2

jobs:
  mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate current mutant list
        run: cargo mutants --list | sort > current_mutants.txt

      - name: Generate per-test coverage map
        run: .github/scripts/generate-coverage-map.sh

      - name: Download previous baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mutants.yml
          branch: main
          event: push
          name: mutants-baseline
          path: previous-baseline
          if_no_artifact_found: ignore

      - name: Prepare previous baseline
        run: |
          if [ -f previous-baseline/current_mutants.txt ]; then
            mv previous-baseline/current_mutants.txt previous_mutants.txt
          fi
          if [ -f previous-baseline/coverage-map.json ]; then
            mv previous-baseline/coverage-map.json previous-coverage-map.json
          fi

      - name: Determine mutants to test
        id: diff
        run: |
          COVERED_SHA=$(gh run list --workflow=mutants.yml --branch=main --event=push --status=success --limit=1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          if [ -n "$COVERED_SHA" ] && git cat-file -e "$COVERED_SHA" 2>/dev/null; then
            export COVERED_SHA
          fi

          .github/scripts/find-mutants-to-test.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run mutation testing (no baseline — full)
        if: steps.diff.outputs.mode == 'full'
        run: cargo mutants -vV -j2 --baseline=skip --timeout 60

      - name: Run mutation testing (targeted)
        if: steps.diff.outputs.mode == 'incremental'
        run: cargo mutants -vV -j2 --baseline=skip --timeout 60 --re "${{ steps.diff.outputs.pattern }}"

      - name: Upload mutant baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-baseline
          path: |
            current_mutants.txt
            coverage-map.json

      - name: Upload mutation testing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-results
          path: mutants.out/
