name: Mutation Testing

on:
  workflow_call:
    inputs:
      update_badge:
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.shards.outputs.shards }}
      shard_total: ${{ steps.shards.outputs.shard_total }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: "true"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-mutants

      - name: Generate current mutant list
        run: cargo mutants --list --colors=never | LC_ALL=C sort > current_mutants.txt

      - name: Compute shard count
        id: shards
        run: |
          count=$(wc -l < current_mutants.txt | tr -d ' ')
          per_shard=30
          total=$(( (count + per_shard - 1) / per_shard ))
          if [ "$total" -lt 1 ]; then total=1; fi
          echo "shard_total=$total" >> "$GITHUB_OUTPUT"
          shards=$(seq 0 $(( total - 1 )) | jq -R 'tonumber' | jq -sc '.')
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

      - name: Upload mutant baseline
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-baseline
          path: current_mutants.txt

  mutants:
    name: Shard ${{ matrix.shard }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: "true"

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install cargo-mutants
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-mutants

      - name: Install cargo-nextest
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-nextest

      - name: Run mutation testing
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-results-${{ matrix.shard }}
          path: mutants.out/

  badge:
    name: Update Badge
    needs: [prepare, mutants]
    if: inputs.update_badge && needs.mutants.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all shard results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: mutants-results-*
          path: results

      - name: Download baseline
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: mutants-baseline
          path: baseline

      - name: Calculate mutation score
        id: score
        run: .github/scripts/calculate-mutation-score.sh

      - name: Upload killed mutants list
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-killed
          path: killed_mutants.txt

      - name: Update mutation badge
        uses: action-badges/core@5a5deee35aff00eff6253764a5b252b5cba7923c # 0.4.0
        with:
          label: mutants killed
          message: "${{ steps.score.outputs.score }}%"
          message-color: "${{ steps.score.outputs.color }}"
          file-name: mutation.svg
          badge-branch: badges
          github-token: "${{ secrets.GITHUB_TOKEN }}"
