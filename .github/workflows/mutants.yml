name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/mutants.toml"

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-mutants
        uses: taiki-e/install-action@cargo-mutants

      - name: Run mutation testing
        run: cargo mutants -vV --in-place

      - name: Upload mutation testing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-results
          path: mutants.out/
