name: Mutation Testing

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  prepare:
    name: Prepare
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.diff.outputs.mode }}
      pattern: ${{ steps.diff.outputs.pattern }}
      shards: ${{ steps.shards.outputs.shards }}
      shard_total: ${{ steps.shards.outputs.shard_total }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate current mutant list
        run: cargo mutants --list --colors=never | sort > current_mutants.txt

      - name: Generate per-test coverage map
        run: .github/scripts/generate-coverage-map.sh

      - name: Download previous baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mutants.yml
          branch: main
          event: workflow_run
          name: mutants-baseline
          path: previous-baseline
          if_no_artifact_found: ignore

      - name: Download previous killed list
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mutants.yml
          branch: main
          event: workflow_run
          name: mutants-killed
          path: previous-killed
          if_no_artifact_found: ignore

      - name: Prepare previous baseline
        run: |
          if [ -f previous-baseline/current_mutants.txt ]; then
            mv previous-baseline/current_mutants.txt previous_mutants.txt
          fi
          if [ -f previous-baseline/coverage-map.json ]; then
            mv previous-baseline/coverage-map.json previous-coverage-map.json
          fi
          if [ -f previous-killed/killed_mutants.txt ]; then
            mv previous-killed/killed_mutants.txt previous_killed_mutants.txt
          fi

      - name: Determine mutants to test
        id: diff
        run: |
          COVERED_SHA=$(gh run list --workflow=mutants.yml --branch=main --status=success --limit=1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          if [ -n "$COVERED_SHA" ] && git cat-file -e "$COVERED_SHA" 2>/dev/null; then
            export COVERED_SHA
          fi

          .github/scripts/find-mutants-to-test.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute shard count
        id: shards
        run: |
          if [ "${{ steps.diff.outputs.mode }}" = "incremental" ]; then
            count=$(wc -l < target_mutants.txt 2>/dev/null || echo "0")
          else
            count=$(wc -l < current_mutants.txt)
          fi
          count=$(echo "$count" | tr -d ' ')
          per_shard=30
          total=$(( (count + per_shard - 1) / per_shard ))
          if [ "$total" -lt 1 ]; then total=1; fi
          echo "shard_total=$total" >> "$GITHUB_OUTPUT"
          shards=$(seq 0 $(( total - 1 )) | jq -R 'tonumber' | jq -sc '.')
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

      - name: Upload mutant baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-baseline
          path: |
            current_mutants.txt
            coverage-map.json

  mutants:
    name: Shard ${{ matrix.shard }}
    needs: prepare
    if: needs.prepare.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run mutation testing (full)
        if: needs.prepare.outputs.mode == 'full'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}

      - name: Run mutation testing (targeted)
        if: needs.prepare.outputs.mode == 'incremental'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}
          --re "${{ needs.prepare.outputs.pattern }}"

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-results-${{ matrix.shard }}
          path: mutants.out/

  badge:
    name: Update Badge
    needs: [prepare, mutants]
    if: >-
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push' &&
      needs.mutants.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: mutants-results-*
          path: results

      - name: Download baseline for killed list
        uses: actions/download-artifact@v4
        with:
          name: mutants-baseline
          path: baseline

      - name: Download previous killed list
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mutants.yml
          branch: main
          event: workflow_run
          name: mutants-killed
          path: previous-killed
          if_no_artifact_found: ignore

      - name: Calculate cumulative mutation score
        id: score
        run: |
          # Collect caught and tested from shard results
          cat results/mutants-results-*/caught.txt 2>/dev/null | sort -u > caught_this_run.txt
          cat results/mutants-results-*/caught.txt results/mutants-results-*/timeout.txt results/mutants-results-*/missed.txt 2>/dev/null | sort -u > tested_this_run.txt

          # Apply formula: killed = (prev_killed ∩ (current - tested)) ∪ caught
          if [ -f previous-killed/killed_mutants.txt ]; then
            comm -23 baseline/current_mutants.txt tested_this_run.txt > untested.txt
            comm -12 previous-killed/killed_mutants.txt untested.txt > surviving_prev.txt
            sort -u surviving_prev.txt caught_this_run.txt > killed_mutants.txt
          else
            cp caught_this_run.txt killed_mutants.txt
          fi

          total=$(wc -l < baseline/current_mutants.txt | tr -d ' ')
          killed=$(wc -l < killed_mutants.txt | tr -d ' ')
          if [ "$total" -gt 0 ]; then
            SCORE=$(awk "BEGIN {printf \"%.1f\", $killed * 100.0 / $total}")
          else
            SCORE="100.0"
          fi
          echo "score=${SCORE}" >> "$GITHUB_OUTPUT"
          echo "Mutation score: ${SCORE}% (killed=$killed, total=$total)"
          if awk "BEGIN {exit !($SCORE >= 100)}"; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN {exit !($SCORE >= 90)}"; then echo "color=green" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN {exit !($SCORE >= 80)}"; then echo "color=yellowgreen" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Upload killed mutants list
        uses: actions/upload-artifact@v4
        with:
          name: mutants-killed
          path: killed_mutants.txt

      - name: Update mutation badge
        uses: action-badges/core@0.4.0
        with:
          label: mutants killed
          message: "${{ steps.score.outputs.score }}%"
          message-color: "${{ steps.score.outputs.color }}"
          file-name: mutation.svg
          badge-branch: badges
          github-token: "${{ secrets.GITHUB_TOKEN }}"
