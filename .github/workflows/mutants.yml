name: Mutation Testing

on:
  workflow_call:
    inputs:
      update_badge:
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.diff.outputs.mode }}
      pattern: ${{ steps.diff.outputs.pattern }}
      shards: ${{ steps.shards.outputs.shards }}
      shard_total: ${{ steps.shards.outputs.shard_total }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: "true"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-mutants

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c1305996457413b456b636a549d9f98354fd89cf # cargo-llvm-cov

      - name: Generate current mutant list
        run: cargo mutants --list --colors=never | LC_ALL=C sort > current_mutants.txt

      - name: Generate per-test coverage map
        run: .github/scripts/generate-coverage-map.sh

      - name: Download previous baseline
        uses: dawidd6/action-download-artifact@2536c51d3d126276eb39f74d6bc9c72ac6ef30d3 # v16
        with:
          workflow: pipeline.yml
          branch: main
          event: push
          name: mutants-baseline
          path: previous-baseline
          if_no_artifact_found: ignore

      - name: Download previous killed list
        uses: dawidd6/action-download-artifact@2536c51d3d126276eb39f74d6bc9c72ac6ef30d3 # v16
        with:
          workflow: pipeline.yml
          branch: main
          event: push
          name: mutants-killed
          path: previous-killed
          if_no_artifact_found: ignore

      - name: Prepare previous baseline
        run: |
          if [ -f previous-baseline/current_mutants.txt ]; then
            mv previous-baseline/current_mutants.txt previous_mutants.txt
          fi
          if [ -f previous-baseline/coverage-map.json ]; then
            mv previous-baseline/coverage-map.json previous-coverage-map.json
          fi
          if [ -f previous-killed/killed_mutants.txt ]; then
            mv previous-killed/killed_mutants.txt previous_killed_mutants.txt
          fi

      - name: Determine mutants to test
        id: diff
        run: |
          COVERED_SHA=$(gh run list --workflow=pipeline.yml --branch=main --status=success --limit=1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          if [ -n "$COVERED_SHA" ] && git cat-file -e "$COVERED_SHA" 2>/dev/null; then
            export COVERED_SHA
          fi

          .github/scripts/find-mutants-to-test.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute shard count
        id: shards
        run: |
          if [ "${{ steps.diff.outputs.mode }}" = "incremental" ]; then
            count=$(wc -l < target_mutants.txt 2>/dev/null || echo "0")
          else
            count=$(wc -l < current_mutants.txt)
          fi
          count=$(echo "$count" | tr -d ' ')
          per_shard=30
          total=$(( (count + per_shard - 1) / per_shard ))
          if [ "$total" -lt 1 ]; then total=1; fi
          echo "shard_total=$total" >> "$GITHUB_OUTPUT"
          shards=$(seq 0 $(( total - 1 )) | jq -R 'tonumber' | jq -sc '.')
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

      - name: Carry forward killed list when skipping
        if: steps.diff.outputs.mode == 'skip' && hashFiles('previous_killed_mutants.txt') != ''
        run: cp previous_killed_mutants.txt killed_mutants.txt

      - name: Upload killed list passthrough
        if: steps.diff.outputs.mode == 'skip' && hashFiles('killed_mutants.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-killed
          path: killed_mutants.txt

      - name: Upload mutant baseline
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-baseline
          path: |
            current_mutants.txt
            coverage-map.json

  mutants:
    name: Shard ${{ matrix.shard }}
    needs: prepare
    if: needs.prepare.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: "true"

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install cargo-mutants
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-mutants

      - name: Install cargo-nextest
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-nextest

      - name: Run mutation testing (full)
        if: needs.prepare.outputs.mode == 'full'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}

      - name: Run mutation testing (targeted)
        if: needs.prepare.outputs.mode == 'incremental'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}
          --re "$MUTANT_PATTERN"
        env:
          MUTANT_PATTERN: ${{ needs.prepare.outputs.pattern }}

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-results-${{ matrix.shard }}
          path: mutants.out/

  badge:
    name: Update Badge
    needs: [prepare, mutants]
    if: inputs.update_badge && needs.mutants.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all shard results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: mutants-results-*
          path: results

      - name: Download baseline for killed list
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: mutants-baseline
          path: baseline

      - name: Download previous killed list
        uses: dawidd6/action-download-artifact@2536c51d3d126276eb39f74d6bc9c72ac6ef30d3 # v16
        with:
          workflow: pipeline.yml
          branch: main
          event: push
          name: mutants-killed
          path: previous-killed
          if_no_artifact_found: ignore

      - name: Calculate cumulative mutation score
        id: score
        run: .github/scripts/calculate-cumulative-score.sh

      - name: Upload killed mutants list
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-killed
          path: killed_mutants.txt

      - name: Update mutation badge
        uses: action-badges/core@5a5deee35aff00eff6253764a5b252b5cba7923c # 0.4.0
        with:
          label: mutants killed
          message: "${{ steps.score.outputs.score }}%"
          message-color: "${{ steps.score.outputs.color }}"
          file-name: mutation.svg
          badge-branch: badges
          github-token: "${{ secrets.GITHUB_TOKEN }}"
