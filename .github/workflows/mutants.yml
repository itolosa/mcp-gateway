name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/mutants.toml"
      - "tests/**"

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.diff.outputs.mode }}
      pattern: ${{ steps.diff.outputs.pattern }}
      shards: ${{ steps.shards.outputs.shards }}
      shard_total: ${{ steps.shards.outputs.shard_total }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate current mutant list
        run: cargo mutants --list | sort > current_mutants.txt

      - name: Generate per-test coverage map
        run: .github/scripts/generate-coverage-map.sh

      - name: Download previous baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mutants.yml
          branch: main
          event: push
          name: mutants-baseline
          path: previous-baseline
          if_no_artifact_found: ignore

      - name: Prepare previous baseline
        run: |
          if [ -f previous-baseline/current_mutants.txt ]; then
            mv previous-baseline/current_mutants.txt previous_mutants.txt
          fi
          if [ -f previous-baseline/coverage-map.json ]; then
            mv previous-baseline/coverage-map.json previous-coverage-map.json
          fi

      - name: Determine mutants to test
        id: diff
        run: |
          COVERED_SHA=$(gh run list --workflow=mutants.yml --branch=main --event=push --status=success --limit=1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          if [ -n "$COVERED_SHA" ] && git cat-file -e "$COVERED_SHA" 2>/dev/null; then
            export COVERED_SHA
          fi

          .github/scripts/find-mutants-to-test.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute shard count
        id: shards
        run: |
          count=$(wc -l < current_mutants.txt)
          per_shard=30
          total=$(( (count + per_shard - 1) / per_shard ))
          if [ "$total" -lt 1 ]; then total=1; fi
          echo "shard_total=$total" >> "$GITHUB_OUTPUT"
          shards=$(seq 0 $(( total - 1 )) | jq -R 'tonumber' | jq -sc '.')
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

      - name: Upload mutant baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-baseline
          path: |
            current_mutants.txt
            coverage-map.json

  mutants:
    name: Shard ${{ matrix.shard }}
    needs: prepare
    if: needs.prepare.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run mutation testing (full)
        if: needs.prepare.outputs.mode == 'full'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}

      - name: Run mutation testing (targeted)
        if: needs.prepare.outputs.mode == 'incremental'
        run: >
          cargo mutants -vV --in-place --baseline=skip --timeout 30
          --shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_total }}
          --re "${{ needs.prepare.outputs.pattern }}"

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-results-${{ matrix.shard }}
          path: mutants.out/

  badge:
    name: Update Badge
    needs: [prepare, mutants]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.mutants.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: mutants-results-*
          path: results

      - name: Calculate mutation score
        id: score
        run: |
          caught=$(cat results/mutants-results-*/caught.txt 2>/dev/null | wc -l)
          timeout=$(cat results/mutants-results-*/timeout.txt 2>/dev/null | wc -l)
          missed=$(cat results/mutants-results-*/missed.txt 2>/dev/null | wc -l)
          total=$((caught + timeout + missed))
          if [ "$total" -gt 0 ]; then
            score=$(awk "BEGIN {printf \"%.1f\", ($caught + $timeout) * 100.0 / $total}")
          else
            score="100.0"
          fi
          echo "score=${score}" >> "$GITHUB_OUTPUT"
          echo "Mutation score: ${score}% (caught=$caught, timeout=$timeout, missed=$missed, total=$total)"

      - name: Update mutation badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 99cedd6610f5d7bcf1df28814dc5c1c2
          filename: mutation.json
          label: mutants killed
          message: "${{ steps.score.outputs.score }}%"
          valColorRange: ${{ steps.score.outputs.score }}
          minColorRange: 50
          maxColorRange: 100
